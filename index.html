<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026PLPEX 項目跟進 Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang HK', sans-serif; background: #f4f5f7; color: #172b4d; font-size: 14px; }

  header { background: #0052cc; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .meta { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .sync-info { display: flex; align-items: center; gap: 10px; }
  .sync-badge { background: rgba(255,255,255,0.2); border-radius: 6px; padding: 4px 10px; font-size: 12px; white-space: nowrap; }
  .refresh-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4); color: white; border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }

  .toolbar { background: white; border-bottom: 1px solid #dfe1e6; padding: 10px 24px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-btn { border: 1px solid #dfe1e6; background: white; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #42526e; }
  .filter-btn:hover { background: #f4f5f7; }
  .filter-btn.active { background: #0052cc; color: white; border-color: #0052cc; }
  .search-box { margin-left: auto; border: 1px solid #dfe1e6; border-radius: 4px; padding: 5px 10px; font-size: 13px; width: 200px; }
  .search-box:focus { outline: none; border-color: #0052cc; }

  .main { display: flex; height: calc(100vh - 110px); overflow: hidden; }

  .sidebar { width: 210px; background: white; border-right: 1px solid #dfe1e6; overflow-y: auto; flex-shrink: 0; padding-bottom: 20px; }
  .sidebar-section { padding: 14px 16px 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #7a869a; letter-spacing: 0.5px; }
  .sidebar-item { padding: 7px 16px; cursor: pointer; border-left: 3px solid transparent; color: #42526e; font-size: 13px; display: flex; justify-content: space-between; align-items: center; gap: 4px; }
  .sidebar-item:hover { background: #f4f5f7; }
  .sidebar-item.active { border-left-color: #0052cc; background: #e9f2ff; color: #0052cc; font-weight: 500; }
  .sidebar-item .lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge { background: #dfe1e6; color: #42526e; border-radius: 10px; padding: 1px 7px; font-size: 11px; flex-shrink: 0; }
  .sidebar-item.active .badge { background: #b3d4ff; color: #0052cc; }

  .content { flex: 1; overflow-y: auto; padding: 20px 24px; }

  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .card { background: white; border-radius: 8px; padding: 14px 16px; border: 1px solid #dfe1e6; }
  .card .num { font-size: 26px; font-weight: 700; }
  .card .lbl { font-size: 12px; color: #7a869a; margin-top: 2px; }

  .progress-wrap { background: white; border-radius: 8px; padding: 14px 16px; border: 1px solid #dfe1e6; margin-bottom: 20px; }
  .progress-wrap h3 { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #42526e; }
  .progress-bar { height: 8px; background: #dfe1e6; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #0052cc; border-radius: 4px; transition: width 0.5s; }
  .progress-label { font-size: 11px; color: #7a869a; margin-top: 4px; display: flex; justify-content: space-between; }

  .section-header { font-size: 13px; font-weight: 700; color: #42526e; margin: 18px 0 8px; padding-bottom: 6px; border-bottom: 2px solid #dfe1e6; display: flex; align-items: center; gap: 8px; }
  .section-count { font-size: 11px; font-weight: 400; color: #7a869a; }

  .task-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; }
  .task-row { background: white; border: 1px solid #dfe1e6; border-radius: 6px; padding: 9px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .task-row.overdue { border-left: 3px solid #de350b; }
  .task-row.done-row { opacity: 0.5; }

  .chk { width: 16px; height: 16px; border: 2px solid #dfe1e6; border-radius: 3px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .chk.on { background: #0052cc; border-color: #0052cc; color: white; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13px; color: #172b4d; line-height: 1.4; }
  .task-row.done-row .task-title { text-decoration: line-through; }
  .task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  .tag { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 11px; }
  .tid { background: #e9f2ff; color: #0052cc; font-weight: 600; }
  .towner { background: #f4f5f7; color: #42526e; }
  .tdate { background: #fff4e5; color: #974f0c; }
  .tdate.od { background: #ffebe6; color: #de350b; }
  .tstatus { display: inline-block; border-radius: 3px; padding: 1px 6px; font-size: 11px; }
  .s-未開始 { background: #dfe1e6; color: #42526e; }
  .s-進行中 { background: #deebff; color: #0052cc; }
  .s-審批中 { background: #fffae6; color: #974f0c; }
  .s-待確認 { background: #fffae6; color: #974f0c; }
  .s-已完成 { background: #e3fcef; color: #006644; }

  .loading { text-align: center; padding: 60px 20px; color: #7a869a; }
  .spinner { width: 32px; height: 32px; border: 3px solid #dfe1e6; border-top-color: #0052cc; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #ffebe6; border: 1px solid #ff5630; border-radius: 8px; padding: 16px 20px; margin: 20px 0; color: #de350b; font-size: 13px; line-height: 1.7; }
  .error-box strong { display: block; margin-bottom: 6px; font-size: 14px; }
  .empty { text-align: center; color: #7a869a; padding: 40px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>2026PLPEX 項目跟進 Dashboard</h1>
    <div class="meta">2026年葡語國家產品及服務展｜10月21–24日｜澳門威尼斯人</div>
  </div>
  <div class="sync-info">
    <span class="sync-badge" id="sync-time">讀取中...</span>
    <button class="refresh-btn" onclick="fetchData()">↻ 刷新</button>
  </div>
</header>

<div class="toolbar">
  <button class="filter-btn active" onclick="setStatus('all',this)">全部</button>
  <button class="filter-btn" onclick="setStatus('未開始',this)">未開始</button>
  <button class="filter-btn" onclick="setStatus('進行中',this)">進行中</button>
  <button class="filter-btn" onclick="setStatus('審批中',this)">審批中</button>
  <button class="filter-btn" onclick="setStatus('已完成',this)">已完成</button>
  <button class="filter-btn" onclick="setStatus('overdue',this)">已逾期</button>
  <input class="search-box" type="text" placeholder="搜尋任務或負責人..." oninput="doSearch(this.value)">
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">月份</div>
    <div class="sidebar-item active" data-m="all" onclick="setMonth('all',this)"><span class="lbl">全部</span><span class="badge" id="bm-all">—</span></div>
    <div class="sidebar-item" data-m="4月" onclick="setMonth('4月',this)"><span class="lbl">4月（T-6）</span><span class="badge" id="bm-4月">—</span></div>
    <div class="sidebar-item" data-m="5月" onclick="setMonth('5月',this)"><span class="lbl">5月（T-5）</span><span class="badge" id="bm-5月">—</span></div>
    <div class="sidebar-item" data-m="6月" onclick="setMonth('6月',this)"><span class="lbl">6月（T-4）</span><span class="badge" id="bm-6月">—</span></div>
    <div class="sidebar-item" data-m="待跟進" onclick="setMonth('待跟進',this)"><span class="lbl">待跟進</span><span class="badge" id="bm-待跟進">—</span></div>
    <div class="sidebar-section">大類</div>
    <div id="cat-sidebar"></div>
    <div class="sidebar-section">負責人</div>
    <div id="owner-sidebar"></div>
  </div>

  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div>正在讀取 Google Sheet 數據...</div>
  </div>
</div>

<script>
const SHEET_ID = '1MN0AYLEMjoux-pfooXafnn4_yRciGn6I0sXM1aiHLx0';
const CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&gid=0';
const CATS = ['招展招商','論壇及同期活動','設計及宣傳','展覽規劃及場地','行政及財務'];

let TASKS = [];
let fStatus = 'all', fMonth = 'all', fCat = 'all', fOwner = 'all', fSearch = '';

function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]).map(h => h.trim().replace(/^"|"$/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (!vals[0] || !vals[0].trim()) continue;
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (vals[idx]||'').trim().replace(/^"|"$/g,''); });
    rows.push(obj);
  }
  return rows;
}

async function fetchData() {
  document.getElementById('sync-time').textContent = '讀取中...';
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (!rows.length) throw new Error('試算表為空或格式不符');
    TASKS = rows.map(r => ({
      id: r['ID'] || '',
      month: r['月份'] || '',
      cat: r['大類'] || '',
      title: r['任務'] || '',
      owner: r['負責人'] || '',
      date: r['截止日期'] || '',
      status: r['狀態'] || '未開始',
      note: r['備註'] || '',
    }));
    const now = new Date();
    document.getElementById('sync-time').textContent =
      '同步：' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    render();
  } catch(e) {
    document.getElementById('sync-time').textContent = '讀取失敗';
    document.getElementById('main-content').innerHTML =
      '<div class="error-box"><strong>無法讀取 Google Sheet 數據</strong>' +
      '請確認：<br>1. Google Sheet 已設為「知道連結的人可查看」<br>' +
      '2. 表頭格式：ID / 月份 / 大類 / 任務 / 負責人 / 截止日期 / 狀態 / 備註<br><br>錯誤：' + e.message + '</div>';
  }
}

function isOverdue(t) { return t.status !== '已完成' && t.date && t.date.includes('4月'); }

function getFiltered() {
  return TASKS.filter(t => {
    if (fStatus !== 'all') {
      if (fStatus === 'overdue') { if (!isOverdue(t)) return false; }
      else if (t.status !== fStatus) return false;
    }
    if (fMonth !== 'all' && t.month !== fMonth) return false;
    if (fCat !== 'all' && t.cat !== fCat) return false;
    if (fOwner !== 'all' && !t.owner.includes(fOwner)) return false;
    if (fSearch && !t.title.toLowerCase().includes(fSearch) &&
        !t.owner.toLowerCase().includes(fSearch) && !t.id.toLowerCase().includes(fSearch)) return false;
    return true;
  });
}

function setStatus(s, btn) { fStatus = s; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function setMonth(m, el) { fMonth = m; document.querySelectorAll('[data-m]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function setCat(c) { fCat = fCat===c?'all':c; render(); }
function setOwner(o) { fOwner = fOwner===o?'all':o; render(); }
function doSearch(q) { fSearch = q.toLowerCase().trim(); render(); }

function render() {
  if (!TASKS.length) return;
  const vis = getFiltered();
  const main = TASKS.filter(t => t.month !== '待跟進');
  const total = main.length;
  const done = TASKS.filter(t => t.status==='已完成').length;
  const inprog = TASKS.filter(t => t.status==='進行中').length;
  const review = TASKS.filter(t => t.status==='審批中').length;
  const overdue = TASKS.filter(isOverdue).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;

  ['all','4月','5月','6月','待跟進'].forEach(m => {
    const el = document.getElementById('bm-'+m);
    if (el) el.textContent = m==='all' ? TASKS.length : TASKS.filter(t=>t.month===m).length;
  });

  document.getElementById('cat-sidebar').innerHTML = CATS.map(c => {
    const cnt = TASKS.filter(t=>t.cat===c).length;
    return '<div class="sidebar-item '+(fCat===c?'active':'')+'" onclick="setCat(\''+c+'\')">' +
      '<span class="lbl">'+c+'</span><span class="badge">'+cnt+'</span></div>';
  }).join('');

  const owners = [...new Set(TASKS.flatMap(t=>t.owner.split('/').map(o=>o.trim())))].sort();
  document.getElementById('owner-sidebar').innerHTML = owners.map(o => {
    const cnt = TASKS.filter(t=>t.owner.includes(o)).length;
    return '<div class="sidebar-item '+(fOwner===o?'active':'')+'" onclick="setOwner(\''+o+'\')">' +
      '<span class="lbl">'+o+'</span><span class="badge">'+cnt+'</span></div>';
  }).join('');

  const grouped = {};
  vis.forEach(t => {
    const key = t.month + '｜' + t.cat;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });

  const mOrd = k => k.startsWith('4')?0:k.startsWith('5')?1:k.startsWith('6')?2:3;
  const cOrd = c => { const i=CATS.indexOf(c); return i>=0?i:99; };
  const keys = Object.keys(grouped).sort((a,b) => {
    const mo = mOrd(a)-mOrd(b); if(mo!==0) return mo;
    return cOrd(a.split('｜')[1]) - cOrd(b.split('｜')[1]);
  });

  let tasksHTML = !keys.length ? '<div class="empty">沒有符合條件的任務</div>' : '';
  keys.forEach(k => {
    const items = grouped[k];
    tasksHTML += '<div class="section-header">'+k+' <span class="section-count">'+items.length+' 項</span></div><div class="task-list">';
    items.forEach(t => {
      const od = isOverdue(t), isDone = t.status==='已完成';
      tasksHTML += '<div class="task-row '+(isDone?'done-row':'')+(od?' overdue':'')+'">'+
        '<div class="chk '+(isDone?'on':'')+'">'+( isDone?'✓':'' )+'</div>'+
        '<div class="task-body">'+
        '<div class="task-title">'+t.title+(t.note?' <span style="color:#7a869a;font-size:11px">— '+t.note+'</span>':'')+'</div>'+
        '<div class="task-meta">'+
        '<span class="tag tid">'+t.id+'</span>'+
        '<span class="tag towner">'+t.owner+'</span>'+
        '<span class="tag tdate '+(od?'od':'')+'">'+t.date+'</span>'+
        '<span class="tstatus s-'+t.status+'">'+t.status+'</span>'+
        '</div></div></div>';
    });
    tasksHTML += '</div>';
  });

  document.getElementById('main-content').innerHTML =
    '<div class="summary-cards">'+
    '<div class="card"><div class="num" style="color:#0052cc">'+TASKS.length+'</div><div class="lbl">總任務數</div></div>'+
    '<div class="card"><div class="num" style="color:#00875a">'+done+'</div><div class="lbl">已完成</div></div>'+
    '<div class="card"><div class="num" style="color:#0052cc">'+inprog+'</div><div class="lbl">進行中</div></div>'+
    '<div class="card"><div class="num" style="color:#974f0c">'+review+'</div><div class="lbl">審批中</div></div>'+
    '<div class="card"><div class="num" style="color:#de350b">'+overdue+'</div><div class="lbl">已逾期</div></div>'+
    '</div>'+
    '<div class="progress-wrap"><h3>第一階段整體進度（4–6月，共 '+total+' 項）</h3>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="progress-label"><span>'+done+' / '+total+' 項完成</span><span>'+pct+'%</span></div></div>'+
    tasksHTML;
}

fetchData();
setInterval(fetchData, 300000);
</script>
</body>
</html>
