  {id:'M8',title:'確認去年PR公司為Heyco，評估是否沿用',owner:'Kelvin',date:'待確認',month:'misc',cat:'行政及財務',status:'todo'},
  {id:'M2',title:'取得場地清單：各場地規模、設備、平面圖，建立場地規劃表',owner:'Kelvin/Winnie',date:'待確認',month:'misc',cat:'展覽規劃及場地',status:'todo'},
  {id:'M7',title:'品鑑區：確認面積、設備，是否開放展商申請，是否納入大會活動日程',owner:'Kelvin',date:'待確認',month:'misc',cat:'展覽規劃及場地',status:'todo'},
  {id:'M4',title:'農業產業鏈論壇：出初步方案及人選建議（截止：8月）',owner:'Susanni/Tony',date:'8月前',month:'misc',cat:'論壇及同期活動',status:'todo'},
  {id:'M5',title:'首發項目發佈會：出初步方案及嘉賓邀請',owner:'Susanni/Tony',date:'待確認',month:'misc',cat:'論壇及同期活動',status:'todo'},
  {id:'M6',title:'咖啡豆比賽及紅酒評選：通知展商招募，與PR公司協調（注意：高度數酒類入澳須繳稅）',owner:'Susanni/Tony',date:'待確認',month:'misc',cat:'論壇及同期活動',status:'todo'},
];

const CATS = ['招展招商','論壇及同期活動','設計及宣傳','展覽規劃及場地','行政及財務'];

let fStatus = 'all', fMonth = 'all', fCat = 'all', fOwner = 'all', fSearch = '';

function isOverdue(t) { return t.status!=='done' && t.date && t.date.includes('4月'); }
function isDueSoon(t) { return t.status!=='done' && t.date && (t.date==='5月初'||t.date==='5月中'); }
function slabel(s) { return {todo:'待辦',inprog:'進行中',review:'待審批',done:'已完成'}[s]||s; }

function getFiltered() {
  return TASKS.filter(t => {
    if (fStatus!=='all') {
      if (fStatus==='overdue') { if (!isOverdue(t)) return false; }
      else if (t.status!==fStatus) return false;
    }
    if (fMonth!=='all' && t.month!==fMonth) return false;
    if (fCat!=='all' && t.cat!==fCat) return false;
    if (fOwner!=='all' && !t.owner.includes(fOwner)) return false;
    if (fSearch && !t.title.toLowerCase().includes(fSearch) && !t.owner.toLowerCase().includes(fSearch) && !t.id.toLowerCase().includes(fSearch)) return false;
    return true;
  });
}

function setStatus(s,btn) { fStatus=s; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function setMonth(m,el) { fMonth=m; document.querySelectorAll('[data-m]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }
function setCat(c) { fCat=fCat===c?'all':c; render(); }
function setOwner(o) { fOwner=fOwner===o?'all':o; render(); }
function doSearch(q) { fSearch=q.toLowerCase().trim(); render(); }

function render() {
  const vis = getFiltered();
  const total46 = TASKS.filter(t=>t.month!=='misc').length;
  const done = TASKS.filter(t=>t.status==='done').length;
  const inprog = TASKS.filter(t=>t.status==='inprog').length;
  const review = TASKS.filter(t=>t.status==='review').length;
  const overdue = TASKS.filter(isOverdue).length;

  document.getElementById('summary').innerHTML = `
    <div class="card"><div class="num" style="color:#0052cc">${TASKS.length}</div><div class="lbl">總任務數</div></div>
    <div class="card"><div class="num" style="color:#00875a">${done}</div><div class="lbl">已完成</div></div>
    <div class="card"><div class="num" style="color:#0052cc">${inprog}</div><div class="lbl">進行中</div></div>
    <div class="card"><div class="num" style="color:#974f0c">${review}</div><div class="lbl">待審批</div></div>
    <div class="card"><div class="num" style="color:#de350b">${overdue}</div><div class="lbl">已逾期</div></div>
  `;

  const pct = total46>0 ? Math.round(done/total46*100) : 0;
  document.getElementById('prog-total').textContent = total46;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = done+' / '+total46+' 項完成';
  document.getElementById('prog-pct').textContent = pct+'%';

  // Month badges
  ['all','4','5','6','misc'].forEach(m => {
    const el = document.getElementById('bm-'+m);
    if (el) el.textContent = m==='all' ? TASKS.length : TASKS.filter(t=>t.month===m).length;
  });

  // Cat sidebar
  document.getElementById('cat-sidebar').innerHTML = CATS.map(c => {
    const cnt = TASKS.filter(t=>t.cat===c).length;
    return `<div class="sidebar-item ${fCat===c?'active':''}" onclick="setCat('${c}')"><span class="label">${c}</span><span class="badge">${cnt}</span></div>`;
  }).join('');

  // Owner sidebar
  const owners = [...new Set(TASKS.flatMap(t=>t.owner.split('/').map(o=>o.trim())))].sort();
  document.getElementById('owner-sidebar').innerHTML = owners.map(o => {
    const cnt = TASKS.filter(t=>t.owner.includes(o)).length;
    return `<div class="sidebar-item ${fOwner===o?'active':''}" onclick="setOwner('${o}')"><span class="label">${o}</span><span class="badge">${cnt}</span></div>`;
  }).join('');

  // Task area — group by month > cat
  const grouped = {};
  vis.forEach(t => {
    const mLabel = t.month==='misc' ? '待跟進' : t.month+'月';
    const key = mLabel + '｜' + t.cat;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(t);
  });

  const mOrder = k => k.startsWith('4')?0 : k.startsWith('5')?1 : k.startsWith('6')?2 : 3;
  const catOrder = c => CATS.indexOf(c);
  const keys = Object.keys(grouped).sort((a,b) => {
    const mo = mOrder(a) - mOrder(b);
    if (mo!==0) return mo;
    const [,ca] = a.split('｜'); const [,cb] = b.split('｜');
    return catOrder(ca) - catOrder(cb);
  });

  if (!keys.length) {
    document.getElementById('task-area').innerHTML = '<div class="empty">沒有符合條件的任務</div>';
    return;
  }

  let html = '';
  keys.forEach(k => {
    const items = grouped[k];
    html += `<div class="section-header">${k} <span class="section-count">${items.length} 項</span></div><div class="task-list">`;
    items.forEach(t => {
      const od = isOverdue(t), ds = isDueSoon(t);
      html += `<div class="task-row ${t.status==='done'?'done-row':''} ${od?'overdue':ds?'due-soon':''}">
        <div class="chk ${t.status==='done'?'on':''}">${t.status==='done'?'✓':''}</div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            <span class="tag tid">${t.id}</span>
            <span class="tag towner">${t.owner}</span>
            <span class="tag tdate ${od?'od':ds?'ds':''}">${t.date}</span>
            <span class="tstatus s-${t.status}">${slabel(t.status)}</span>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('task-area').innerHTML = html;
}

render();
</script>
</body>
</html>
